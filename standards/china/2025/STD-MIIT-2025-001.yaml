summary_en: "MIIT convened OEMs and industry associations to curb misleading naming and marketing of combined driving assistance systems (e.g. labelling L2 products as ‘autonomous driving’ or ‘intelligent driving’)."
summary_cn: "工信部召集主机厂与行业协会，要求停止将 L2 级组合驾驶辅助产品宣传为“自动驾驶”“智能驾驶”等误导性表述。"
impact_note: "Triggered a wave of branding updates by major Chinese OEMs in Q2 2025."
