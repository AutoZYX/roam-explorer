summary_en: "Introduces the Software Update Management System (SUMS) and RxSWIN (Regulation Software Identification Number) for tracking regulation-relevant software. Requires documentation, rollback and integrity protection for OTA updates."
summary_cn: "引入软件升级管理体系 (SUMS) 与软件版本识别码 RxSWIN。要求对影响型式认证的软件升级进行文档化管理，OTA 需具备完整性保护与回滚机制。"
