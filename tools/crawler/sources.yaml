# Machine-readable config for the AD Standards Tracker crawler.
# 25 primary sources. The crawler scrapes listing / "news" pages only;
# it does not attempt to download or redistribute the standard text itself.
#
# A source with `feed:` (RSS/Atom) is strongly preferred and handled first.
# A source with `html:` uses BeautifulSoup CSS selectors.
# A source with `skip_robots: true` should NEVER be set without explicit
# permission from the issuing body.

defaults:
  user_agent: "AD-Standards-Tracker-Bot/1.0 (contact: zhangyuxin@jlu.edu.cn)"
  timeout_seconds: 30
  retry_count: 3
  retry_backoff_seconds: 2
  max_block_per_source_seconds: 1200  # single-source blocker cap (20 min)
  polite_delay_seconds: 2

sources:
  # ---------------- International ----------------
  - id: unece-wp29
    name: UNECE WP.29 / GRVA
    jurisdiction: international
    html: https://unece.org/transport/road-transport/working-party-automatedautonomous-and-connected-vehicles-introduction
    list_selector: "article, .field__item"
    title_selector: "h2 a, h3 a"
    date_selector: "time"
    keywords: [ALKS, ADS, DCAS, DSSAD, R157, R155, R156, R171, automated, autonomous]

  - id: iso-tc22-sc33
    name: ISO TC22/SC33
    jurisdiction: international
    html: https://www.iso.org/committee/46706.html
    list_selector: "tr.ng-scope, li.committee-item"
    title_selector: "a"
    keywords: [21448, 34502, 34503, 21434, 5083, 24089, 22737, 23150]

  - id: iso-sae-21434
    name: ISO/SAE 21434
    jurisdiction: international
    html: https://www.iso.org/standard/70918.html
    keywords: [21434, cybersecurity]

  # ---------------- China ----------------
