document_number: "UN Regulation No. 156"
title_en: "UN Regulation No. 156 — Uniform provisions concerning the approval of vehicles with regards to software update and software updates management system"
title_cn: "联合国第 156 号法规 — 软件升级与软件升级管理体系型式认证统一规定"
url: https://unece.org/transport/documents/2021/03/standards/un-regulation-no-156-software-update-and-software-update
