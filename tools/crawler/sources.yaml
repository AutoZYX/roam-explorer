    name: SAC
    jurisdiction: china
    html: https://www.sac.gov.cn/
    list_selector: ".list li"
    keywords: [智能网联汽车, 自动驾驶, 征求意见, 型式认证, GB, 汽车信息安全]

  - id: sac-tc114
